spring.application.name=foodplan

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/food}
spring.data.mongodb.auto-index-creation=true

# JWT
jwt.secret=${JWT_SECRET:dGhpcyBpcyBhIGRldiBzZWNyZXQga2V5IHRoYXQgaXMgbG9uZyBlbm91Z2ggZm9yIEhNQUMtU0hBMjU2IHNpZ25pbmc=}
jwt.expiration-seconds=86400

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui

# Actuator
management.endpoints.web.exposure.include=health,info

# File upload (recipe scan)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Slack error notifications (optional)
slack.error.token=${SLACK_ERROR_TOKEN:}
slack.error.channel=${SLACK_ERROR_CHANNEL:}

# Store API integrations
kroger.clientId=${KROGER_CLIENT_ID:}
kroger.clientSecret=${KROGER_CLIENT_SECRET:}
kroger.locationId=${KROGER_LOCATION_ID:}

chefstore.algolia.appId=${CHEFSTORE_ALGOLIA_APP_ID:70KQ5FEQ31}
chefstore.algolia.apiKey=${CHEFSTORE_ALGOLIA_API_KEY:48035a5322b28e6485ae9f3b235b150a}
chefstore.algolia.storeNumber=${CHEFSTORE_STORE_NUMBER:553}

# Store enrichment
store.maxAlternatives=${STORE_MAX_ALTERNATIVES:8}

# Ollama LLM (recipe scan extraction)
ollama.host=${OLLAMA_HOST:}
ollama.port=${OLLAMA_PORT:11434}
ollama.vision-model=${OLLAMA_VISION_MODEL:qwen3.5:9b}
ollama.text-model=${OLLAMA_TEXT_MODEL:qwen3:14b}
ollama.timeout=${OLLAMA_TIMEOUT:300}

# Global Recipe Book (cross-instance sharing)
foodplan.shared.mongodb.uri=${SHARED_MONGODB_URI:}
foodplan.instance.id=${INSTANCE_ID:}
foodplan.instance.name=${INSTANCE_NAME:}
