# Production overrides — copy to docker-compose.prod.yml and fill in values.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
services:
  mongo:
    restart: unless-stopped

  backend:
    environment:
      JWT_SECRET: <generate-a-base64-encoded-256-bit-secret>
      CORS_ALLOWED_ORIGINS: http://your-host:3001
      # Optional: Slack error notifications
      SLACK_ERROR_TOKEN: ${SLACK_ERROR_TOKEN:-}
      # Optional: Kroger API (register at https://developer.kroger.com)
      KROGER_CLIENT_ID: ${KROGER_CLIENT_ID:-}
      KROGER_CLIENT_SECRET: ${KROGER_CLIENT_SECRET:-}
      KROGER_LOCATION_ID: ${KROGER_LOCATION_ID:-}
    restart: unless-stopped

  frontend:
    ports:
      - "3001:80"
    restart: unless-stopped
